server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 500m;

    # Proxy auth requests to the auth service so cookies are same-origin.
    # Fixes cross-site cookie blocks (Safari ITP, Chrome incognito, etc.).
    # Rollback: comment out this block + set VITE_AUTH_SERVICE_URL to the
    # direct https://nomikos-auth-service.onrender.com URL.
    location /auth-api/ {
        proxy_pass https://nomikos-auth-service.onrender.com/;
        proxy_set_header Host nomikos-auth-service.onrender.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_cookie_domain nomikos-auth-service.onrender.com $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
